server:
  port: 8080

spring:
  application:
    name: risk-flow-server
  datasource:
    url: jdbc:postgresql://localhost:5432/riskflow
    username: postgres
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

riskflow:
  enabled: true
  app-name: risk-flow-server
  engine:
    parallel-execution: true
    thread-pool-size: 10
    execution-timeout-ms: 5000
    cache-enabled: true
  plugin:
    scan-path: org.example.plugin
    hot-reload-enabled: false
    plugin-dir: ./plugins
